<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="navbar">

<h2>
Fake News Verification
</h2>


<div>

<span>
Welcome {{ username }}
</span>


<a href="/history">
History
</a>


<a href="/logout">
Logout
</a>


</div>


</div>



<div class="container">


<h2>
Check News
</h2>


<form method="POST">


<textarea 
name="news"
placeholder="Enter news headline here..."
required>
</textarea>


<button>
Check News
</button>


</form>



{% if result %}


<div class="result">


<h3>
Result: {{ result }}
</h3>


<p>

Confidence:
{{ confidence }} %

</p>


</div>


{% endif %}


</div>


</body>

</html>
