<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>


<div class="container">

<h1>Fake News Verification</h1>

<h2>Create Account</h2>


{% if error %}

<p class="error">
    {{ error }}
</p>

{% endif %}


<form method="POST">


<input type="text"
       name="username"
       placeholder="Username"
       required>


<input type="password"
       name="password"
       placeholder="Password"
       required>


<button type="submit">
    Register
</button>


</form>


<p>
Already have account?

<a href="/login">
Login
</a>

</p>


</div>


</body>
</html>
