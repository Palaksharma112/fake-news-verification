<!DOCTYPE html>
<html>
<head>
    <title>Fake News Verification System</title>
    <link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="container">
    <h1>Fake News Verification</h1>

    <form method="POST">
        <textarea name="news" placeholder="Enter news headline here..." required></textarea>
        <br>
        <button type="submit">Check News</button>
    </form>

    {% if result %}
    <div class="result">
        Result: {{ result }}
    </div>

    <div class="confidence">
        Confidence: {{ confidence }}%
    </div>
    {% endif %}

</div>

</body>
</html>
